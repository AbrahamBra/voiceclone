<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceClone</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◎</text></svg>">
</head>
<body>
  <!-- Screen: Access -->
  <div id="screen-access" class="screen active">
    <div class="access-card">
      <h1>VoiceClone</h1>
      <p class="subtitle">Entrez votre code d'acces</p>
      <div class="access-form">
        <input type="password" id="access-code" placeholder="Code d'acces" autocomplete="off">
        <button id="access-btn">Entrer</button>
      </div>
      <p id="access-error" class="error hidden"></p>
      <div id="persona-list" class="persona-list hidden"></div>
    </div>
  </div>

  <!-- Screen: Clone creation -->
  <div id="screen-create" class="screen">
    <div class="create-container">
      <h2>Creer un clone</h2>
      <p class="subtitle">Collez une URL LinkedIn ou remplissez manuellement</p>
      <div class="create-step">
        <label>URL LinkedIn (remplissage automatique)</label>
        <div class="scrape-row">
          <input type="text" id="clone-url" placeholder="linkedin.com/in/username">
          <button type="button" id="scrape-btn" class="btn-secondary">Scraper</button>
        </div>
        <p id="scrape-status" class="scrape-status hidden"></p>
      </div>
      <div class="create-divider"><span>ou remplissez manuellement</span></div>
      <div class="create-step">
        <label>Profil LinkedIn</label>
        <textarea id="clone-linkedin" rows="4" placeholder="Titre, a propos, experience..."></textarea>
      </div>
      <div class="create-step">
        <label>Posts LinkedIn (min. 3, separes par ---)</label>
        <textarea id="clone-posts" rows="6" placeholder="Post 1...&#10;---&#10;Post 2...&#10;---&#10;Post 3..."></textarea>
      </div>
      <div class="create-step">
        <label>Documents (optionnel)</label>
        <div class="file-upload-zone">
          <input type="file" id="clone-file" accept=".pdf,.txt,.csv,.docx" multiple hidden>
          <button type="button" id="clone-file-btn" class="file-upload-btn">+ Ajouter des fichiers</button>
          <div id="file-list" class="file-list"></div>
        </div>
        <textarea id="clone-docs" rows="3" placeholder="Ou collez du texte directement..."></textarea>
      </div>
      <button id="clone-submit">Generer le clone</button>
      <p id="clone-status" class="hidden"></p>
    </div>
  </div>

  <!-- Screen: Calibration -->
  <div id="screen-calibrate" class="screen">
    <div class="calibrate-container">
      <h2>Calibrer le clone</h2>
      <p class="subtitle">Notez ces messages pour affiner la voix</p>
      <div id="calibrate-cards" class="calibrate-cards"></div>
      <div class="calibrate-actions">
        <button id="calibrate-skip" class="btn-secondary">Passer</button>
        <button id="calibrate-submit">Valider la calibration</button>
      </div>
      <p id="calibrate-status" class="hidden"></p>
    </div>
  </div>

  <!-- Screen: Scenario selection -->
  <div id="screen-scenarios" class="screen">
    <div class="scenarios-container">
      <h2>Mode</h2>
      <div id="scenario-cards" class="scenario-cards"></div>
    </div>
  </div>

  <!-- Screen: Chat -->
  <div id="screen-chat" class="screen">
    <div class="chat-layout">
      <aside class="conv-sidebar" id="conv-sidebar">
        <div class="conv-sidebar-header">
          <button class="conv-switch-btn" id="conv-switch-btn" aria-label="Changer de clone">&#8592; Changer de clone</button>
          <button class="conv-new-btn" id="conv-new-btn">+ Nouvelle conversation</button>
          <input type="text" class="conv-search" id="conv-search" placeholder="Rechercher...">
        </div>
        <div class="conv-list" id="conv-list"></div>
      </aside>
      <div class="chat-main">
        <header class="chat-header">
          <button class="back-btn" id="back-btn" aria-label="Retour aux scenarios">&#8592;</button>
          <div class="chat-avatar" id="chat-avatar"></div>
          <span class="chat-name" id="chat-name"></span>
          <button class="lead-btn" id="lead-btn" title="Analyser un lead">&#128269;</button>
          <button class="settings-btn" id="settings-btn" title="Parametres">&#9881;</button>
        </header>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-bar">
          <textarea id="chat-input" placeholder="Message..." rows="1"></textarea>
          <button id="chat-send">Envoyer</button>
        </div>
        <div id="chat-toast" class="toast hidden"></div>
      </div>
    </div>
  </div>

  <!-- Lead analysis modal -->
  <div id="lead-overlay" class="feedback-overlay" style="display:none">
    <div class="feedback-modal">
      <h3>Analyser un lead</h3>
      <p class="feedback-hint">Collez un profil LinkedIn pour enrichir la conversation.</p>
      <input type="text" id="lead-url" placeholder="linkedin.com/in/username" style="width:100%;padding:0.5rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.85rem;font-family:inherit;">
      <p id="lead-status" class="scrape-status hidden"></p>
      <div class="feedback-actions">
        <button class="feedback-cancel" id="lead-cancel">Annuler</button>
        <button class="feedback-submit" id="lead-submit">Analyser</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
